name: Build & Deploy to Bare Metal

# Trigger: setiap push ke branch master
on:
  push:
    branches: [master]

env:
  # Image name menggunakan github.repository (format: owner/repo) — otomatis, tidak perlu secret tambahan
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest

    # Izin untuk push ke GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (multi-platform builder, lebih cepat dengan cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login ke GitHub Container Registry menggunakan GHCR_PAT secret
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 4. Build image Docker dari Dockerfile (repo root = frontend/) dan push ke ghcr.io
      #    Build args NEXT_PUBLIC_* diperlukan saat next build (baked ke bundle JS)
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .                 # Repo root = frontend/ — Dockerfile ada di sini
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Layer cache dari GHCR — mempercepat build berikutnya secara signifikan
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://ettawa-sakra.momoi.my.id
            NEXT_PUBLIC_MOCK_MODE=false
            NEXT_PUBLIC_API_KEY=${{ secrets.API_KEY }}

  deploy:
    name: Deploy to Bare Metal via SSH
    runs-on: ubuntu-latest
    needs: build-and-push  # Jalankan hanya setelah image berhasil di-push

    steps:
      # Checkout diperlukan agar docker-compose.yml tersedia di workspace runner.
      # Setiap job berjalan di runner fresh — file dari job build-and-push tidak ikut terbawa.
      - name: Checkout
        uses: actions/checkout@v4

      # 5. Install Tailscale dan join network
      #    Server tidak expose port SSH ke internet — akses via Tailscale mesh VPN.
      #    Runner GitHub Actions harus join network yang sama sebelum bisa SSH.
      #    Node ephemeral ditentukan oleh tipe auth key (centang "Ephemeral" di Tailscale admin),
      #    bukan via flag CLI — node otomatis dihapus dari network setelah job selesai.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 6. Salin docker-compose.yml ke server via SCP
      #    Tidak memerlukan git di server — file langsung di-copy dari runner.
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "docker-compose.yml"   # Ada di repo root (frontend/docker-compose.yml)
          target:   ${{ secrets.DEPLOY_PATH }}

      # 7. Deploy ke server via SSH
      #    Urutan:
      #      a) Login ke GHCR
      #      b) Pull image terbaru
      #      c) Restart container
      #      d) Bersihkan image lama
      #      e) Verifikasi health endpoint
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "==> Pindah ke deploy path..."
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Login ke GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pull image terbaru..."
            GHCR_REPO=${{ github.repository }} docker compose pull

            echo "==> Restart container dengan image baru..."
            GHCR_REPO=${{ github.repository }} docker compose up -d --force-recreate

            echo "==> Bersihkan image lama..."
            docker image prune -f

            echo "==> Verifikasi health endpoint..."
            sleep 5
            curl -sf http://localhost:5151/api/health | grep '"ok":true' \
              && echo "✅ Deploy sukses!" \
              || (echo "❌ Health check gagal!" && exit 1)
